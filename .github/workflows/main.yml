name: Borsa Takip Botu

on:
  schedule:
    # Saat 09:00 ile 16:00 arası her saat başı (Rutin Mod için)
    - cron: '0 8-15 * * 1-5'
    # Saat 16:00'da (Türkiye 19:00'da) tek seferlik (Özet Mod için)
    - cron: '0 16 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Bot
        run: python borsa_bot.py
