<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Future AI Summit · Program</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg: #0b0b0f;
            --surface: #14141c;
            --card-bg: #1a1a26;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --text: #f0f0f5;
            --text-muted: #9a9aae;
            --radius: 24px;
            --shadow: 0 20px 60px -30px rgba(0, 0, 0, 0.8);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --transition: 0.2s ease;
        }
        html {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: var(--bg);
            min-height: 100vh;
            padding: 16px 12px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app {
            max-width: 500px;
            width: 100%;
        }

        /* header */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 18px;
        }
        .app-header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f0f0f5 30%, #7a7a9a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .fave-count {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* filters */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
            background: var(--surface);
            padding: 12px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border-subtle);
        }
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            flex: 1 1 100%;
        }
        .filter-group label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text-muted);
            margin-right: 4px;
            min-width: 44px;
        }
        .filter-btn {
            font-size: 12px;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
            white-space: nowrap;
            touch-action: manipulation;
            user-select: none;
        }
        .filter-btn:active {
            transform: scale(0.96);
        }
        .filter-btn.active {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.18);
        }
        .filter-btn.fave-active {
            background: rgba(239, 68, 68, 0.20);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.30);
        }
        .filter-btn.fave-active .heart-icon {
            display: inline-block;
        }
        .filter-btn .heart-icon {
            display: none;
            margin-right: 4px;
        }
        .filter-btn.fave-active .heart-icon {
            display: inline-block;
        }
        .filter-btn.fave-inactive {
            opacity: 0.5;
        }
        .filter-clear {
            font-size: 11px;
            color: var(--text-muted);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            font-family: var(--font);
            text-decoration: underline dotted;
            margin-left: auto;
        }
        .filter-clear:active {
            opacity: 0.6;
        }

        /* card grid */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* card */
        .card {
            position: relative;
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: var(--card-bg);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            padding: 16px 18px 18px;
        }
        .card:active {
            transform: scale(0.995);
        }

        .card-stage-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3.5px;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 6px;
            gap: 12px;
        }
        .card-stage-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--text-muted);
        }
        .card-stage-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .card-fave {
            background: transparent;
            border: none;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            padding: 2px;
            transition: var(--transition);
            color: rgba(255, 255, 255, 0.15);
            touch-action: manipulation;
            flex-shrink: 0;
            margin-top: -4px;
        }
        .card-fave:active {
            transform: scale(0.85);
        }
        .card-fave.liked {
            color: #ef4444;
        }

        .card-time {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.2px;
            color: var(--text-muted);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-time .dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text-muted);
            opacity: 0.3;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.3;
            letter-spacing: -0.2px;
            margin-top: 4px;
            color: #fff;
        }
        .card-desc {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-muted);
            margin-top: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-desc.expanded {
            -webkit-line-clamp: unset;
            display: block;
        }
        .card-desc-toggle {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: var(--font);
            padding: 4px 0 0;
            margin-top: 2px;
            display: inline-block;
        }
        .card-desc-toggle:active {
            opacity: 0.5;
        }

        .card-type {
            display: inline-block;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 3px 10px;
            border-radius: 40px;
            margin-top: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
        }
        .card-type.keynote {
            background: rgba(251, 191, 36, 0.12);
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.20);
        }
        .card-type.panel {
            background: rgba(56, 189, 248, 0.10);
            color: #38bdf8;
            border-color: rgba(56, 189, 248, 0.18);
        }
        .card-type.bireysel {
            background: rgba(192, 132, 252, 0.10);
            color: #c084fc;
            border-color: rgba(192, 132, 252, 0.18);
        }
        .card-type.vc {
            background: rgba(52, 211, 153, 0.10);
            color: #34d399;
            border-color: rgba(52, 211, 153, 0.18);
        }
        .card-type.girisim {
            background: rgba(251, 146, 146, 0.10);
            color: #fb7185;
            border-color: rgba(251, 146, 146, 0.18);
        }
        .card-type.b2b {
            background: rgba(103, 232, 249, 0.10);
            color: #67e8f9;
            border-color: rgba(103, 232, 249, 0.18);
        }

        /* speakers */
        .speakers {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .speaker {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1 1 calc(50% - 6px);
            max-width: 100%;
        }
        .speaker-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .speaker-info {
            min-width: 0;
        }
        .speaker-name {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .speaker-title {
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* empty state */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }
        .empty-state .big-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }
        .empty-state p {
            font-size: 15px;
            font-weight: 500;
        }
        .empty-state small {
            font-size: 13px;
            opacity: 0.6;
        }

        /* day tabs (inline) */
        .day-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            background: var(--surface);
            padding: 4px;
            border-radius: 60px;
            border: 1px solid var(--border-subtle);
        }
        .day-tab {
            flex: 1;
            padding: 8px 0;
            border: none;
            border-radius: 40px;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 700;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            touch-action: manipulation;
            text-align: center;
        }
        .day-tab:active {
            transform: scale(0.96);
        }
        .day-tab.active {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        /* misc */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        /* scrollable filter row */
        .filter-scroll {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            width: 100%;
        }

        /* responsive fine-tune */
        @media (max-width: 400px) {
            .card {
                padding: 14px 14px 16px;
            }
            .card-title {
                font-size: 15px;
            }
            .speaker {
                flex: 1 1 100%;
            }
            .filter-btn {
                font-size: 11px;
                padding: 4px 11px;
            }
            .filters {
                padding: 10px 12px;
            }
        }
        @media (min-width: 600px) {
            body {
                padding: 24px 20px 60px;
            }
            .app {
                max-width: 720px;
            }
            .cards {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 18px;
            }
            .card {
                padding: 18px 20px 20px;
            }
            .speaker {
                flex: 1 1 100%;
            }
            .filter-group {
                flex: 1 1 auto;
            }
        }
        @media (min-width: 900px) {
            .app {
                max-width: 960px;
            }
            .cards {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }

        /* scrollable filter group on very small */
        .filter-scroll::-webkit-scrollbar {
            height: 2px;
        }
        .filter-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.10);
            border-radius: 4px;
        }

        /* small badge for day on card */
        .card-day-badge {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            padding: 2px 10px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-left: 6px;
        }

        /* restore original semantic style */
        .card-stage-label .stage-name {
            font-weight: 700;
        }

        /* loading shimmer */
        .shimmer {
            background: linear-gradient(90deg, var(--card-bg) 25%, rgba(255, 255, 255, 0.02) 50%, var(--card-bg) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s infinite;
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <!-- header -->
        <header class="app-header">
            <h1>✦ Future AI Summit</h1>
            <span class="fave-count" id="faveCount">❤️ 0</span>
        </header>

        <!-- day tabs -->
        <div class="day-tabs" role="tablist">
            <button class="day-tab active" data-day="all" role="tab">Tümü</button>
            <button class="day-tab" data-day="1" role="tab">1. Gün</button>
            <button class="day-tab" data-day="2" role="tab">2. Gün</button>
        </div>

        <!-- filters -->
        <div class="filters" id="filters">
            <div class="filter-group">
                <label>Sahne</label>
                <div class="filter-scroll">
                    <button class="filter-btn active" data-filter="stage" data-value="all">Tümü</button>
                    <button class="filter-btn" data-filter="stage" data-value="Kırmızı"><span class="stage-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef4444;margin-right:4px;"></span>Kırmızı</button>
                    <button class="filter-btn" data-filter="stage" data-value="Sarı"><span class="stage-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#eab308;margin-right:4px;"></span>Sarı</button>
                    <button class="filter-btn" data-filter="stage" data-value="Mor"><span class="stage-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#a855f7;margin-right:4px;"></span>Mor</button>
                </div>
            </div>
            <div class="filter-group" style="margin-top:4px;">
                <label>Favori</label>
                <div class="filter-scroll">
                    <button class="filter-btn active" data-filter="fave" data-value="all">Tümü</button>
                    <button class="filter-btn fave-inactive" data-filter="fave" data-value="favorites"><span class="heart-icon" style="display:inline-block;margin-right:4px;">❤️</span>Favoriler</button>
                </div>
                <button class="filter-clear" id="clearFaves" aria-label="Tüm favorileri temizle">✕ temizle</button>
            </div>
        </div>

        <!-- cards -->
        <div class="cards" id="cardsContainer" role="list"></div>

        <!-- empty state (hidden by default) -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="big-icon">🔍</div>
            <p>Bu filtrelerle eşleşen oturum yok</p>
            <small>Farklı bir filtre seçmeyi dene</small>
        </div>
    </div>

    <script>
        // ─── DATA ──────────────────────────────────────────────────────────────
        // Extracted from the provided HTML. All sessions with speakers, images, etc.
        const SESSIONS = [];

        // Helper to push
        function addSession(day, stage, stageColor, stageSub, time, title, desc, type, speakers) {
            const [start, end] = time.split(' – ').map(s => s.trim());
            SESSIONS.push({
                day,
                stage,
                stageColor,
                stageSub,
                time,
                start,
                end,
                title: title.trim(),
                desc: desc ? desc.trim() : '',
                type: type || null,
                speakers: speakers || [],
                id: `${day}-${stage}-${start}-${title.substring(0,20)}`.replace(/\s/g, '_').replace(/[^a-zA-Z0-9_-]/g, '')
            });
        }

        // ─── DAY 1 ──────────────────────────────────────────────────────────────
        const D1 = 1;

        // KIRMIZI SAHNE — Day 1
        let s = 'Kırmızı',
            c = '#ef4444',
            sub = 'Vizyon';
        addSession(D1, s, c, sub, '08:30 – 09:30', 'Kapı Açılışı – Karşılama & Kayıt',
            'Katılımcı kayıt ve karşılama. Etkinlik alanına giriş başlıyor.', null);
        addSession(D1, s, c, sub, '09:30 – 09:35', 'Açılış Töreni & Yapay Zeka Görsel Deneyimi (Lucia)',
            'Lucia tarafından sunulan yapay zeka destekli görsel deneyim ile resmi açılış. Etkinliği sahneye taşıyan kısa bir açılış performansı.',
            null);
        addSession(D1, s, c, sub, '09:35 – 10:00', 'Açılış Konuşmaları',
            'Rektör ve BAU Global yöneticilerinin günü çerçeveleyen açılış konuşmaları.', null, [
                { name: 'Dr. Serdar Şenel', title: 'BAU Global · Başkan Yardımcısı',
                    img: 'https://iltqpqsujtzmzffwnotu.supabase.co/storage/v1/object/public/speaker-photos/7cd47fc7-422f-4c18-bb6d-d740e5fc8e6c.png' },
                { name: 'Prof. Dr. Esra Hatipoğlu', title: 'Bahçeşehir Üniversitesi · Rektör',
                    img: 'https://iltqpqsujtzmzffwnotu.supabase.co/storage/v1/object/public/speaker-photos/submissions/ce73f4bc-7b86-4e0d-a83e-c2499c7676f2.png' },
                { name: 'Hüseyin Yücel', title: 'Bahçeşehir Üniversitesi · Mütevelli Heyeti Başkan Vekili',
                    img: 'https://iltqpqsujtzmzffwnotu.supabase.co/storage/v1/object/public/speaker-photos/88d43397-4d3d-4f7a-9cf1-e1636432cbf1/0aa31f19-270e-42f1-be1d-4480947d2f9c.png' }
            ]);
        addSession(D1, s, c, sub, '10:00 – 10:30', 'Protokol Konuşması',
            'Türkiye Cumhuriyeti Cumhurbaşkanlığı Savunma Sanayii Başkanı Prof. Dr. Haluk Görgün\'ün protokol konuşması.',
            'Keynote', [
                { name: 'Prof. Dr. Haluk Görgün', title: 'Türkiye Cumhuriyeti Cumhurbaşkanlığı · Savunma Sanayii Başkanı',
                    img: 'https://iltqpqsujtzmzffwnotu.supabase.co/storage/v1/object/public/speaker-photos/8a727967-b753-454d-a760-f16962669363/71f494b0-e337-4d12-b4cb-d7a18f0f8de9.png' }
            ]);
        addSession(D1, s, c, sub, '10:30 – 11:00', 'Yapay Zekâ ile Teknoloji Ekosistemini Yeniden Tasarlamak',
            'Bu panelde, yapay zekâ odaklı dönüşüm sürecinde kamu altyapısının rolü, vakıf destekli girişimler ve geliştirme fonlarının ekosistem inşasındaki katkıları ele alınacaktır.',
            'Panel', [
                { name: 'İrem Bayraktar Aksakal', title: 'T3 Vakfı · Başkan Yardımcısı',
                    img: 'https://iltqpqsujtzmzffwnotu.supabase.co/storage/v1/object/public/speaker-photos/b7b42477-2a91-470e-97ce-b8d8626d45c1/53d18e42-d50b-448f-ab3d-ee584972e693.png' }
            ]);
        addSession(D1, s, c, sub, '11:00 – 11:30', 'Zekâyı Yeniden Tasarlamak: Üniversitelerin ve İnsan Vizyonunun Yapay Zekâ İnovasyonuyla Buluştuğu Nokta',
            'Bu panelde, üniversitelerin bilgi üretimindeki rolü ile insan odaklı vizyonun, yapay zekâ inovasyonunu nasıl şekillendirdiği ve geleceği nasıl yeniden tasarladığı ele alınacaktır.',
            'Panel', [
                { name: 'Prof. Dr. Esra Hatipoğlu', title: 'Bahçeşehir Üniversitesi · Rektör',
                    img: 'https://iltqpqsujtzmzffwnotu.supabase.co/storage/v1/object/public/speaker-photos/submissions/ce73f4bc-7b86-4e0d-a83e-c2499c7676f2.png' },
                { name: 'Dr. Sinem Vatanartıran', title: 'Bay Atlantic University · Rektör',
                    img: 'https://iltqpqsujtzmzffwnotu.supabase.co/storage/v1/object/public/speaker-photos/bf76ac63-353f-4d60-be47-0d9b911bb767/5aadf0a0-590f-4058-9dde-d0e0923af207.png' },
                { name: 'Prof. Dr. Mehmet Toycan', title: 'BAU Cyprus · Rektör',
                    img: 'https://iltqpqsujtzmzffwnotu.supabase.co/storage/v1/object/public/speaker-photos/dd46a761-2fe3-485f-8e96-38c199642390/dd775c3c-41b6-45a0-a290-a02a6e3c196f.png' }
            ]);
        addSession(D1, s, c, sub, '11:35 – 12:05', 'Yapay Zeka Çağında Eğitimin Yeni Rotası: İnsan Odaklı Toplum',
            'Yapay zeka çağında eğitimin yeni rotası ve insan odaklı bir toplum için öğrenmenin geleceği. Eğitimde dönüşümün öğrenci ve öğretmen üzerindeki yansımaları.',

        // ─── APPLICATION ──────────────────────────────────────────────────────

        const STORAGE_KEY = 'future_ai_summit_faves';

        function getFavorites() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) return JSON.parse(raw);
            } catch (_) { /* ignore */ }
            return [];
        }

        function saveFavorites(faves) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(faves));
        }

        function toggleFavorite(id) {
            let faves = getFavorites();
            const idx = faves.indexOf(id);
            if (idx >= 0) faves.splice(idx, 1);
            else faves.push(id);
            saveFavorites(faves);
            render();
        }

        function isFavorite(id) {
            return getFavorites().includes(id);
        }

        // ─── RENDER ──────────────────────────────────────────────────────────

        let currentDay = 'all';
        let currentStage = 'all';
        let currentFave = 'all';

        function getTypeClass(type) {
            if (!type) return '';
            const t = type.toLowerCase();
            if (t.includes('keynote')) return 'keynote';
            if (t.includes('panel')) return 'panel';
            if (t.includes('bireysel')) return 'bireysel';
            if (t.includes('vc')) return 'vc';
            if (t.includes('girişim')) return 'girisim';
            if (t.includes('b2b')) return 'b2b';
            return '';
        }

        function render() {
            const container = document.getElementById('cardsContainer');
            const empty = document.getElementById('emptyState');
            const faveCount = document.getElementById('faveCount');

            let filtered = [...SESSIONS];

            // day filter
            if (currentDay !== 'all') {
                filtered = filtered.filter(s => s.day === parseInt(currentDay));
            }

            // stage filter
            if (currentStage !== 'all') {
                filtered = filtered.filter(s => s.stage === currentStage);
            }

            // fave filter
            if (currentFave === 'favorites') {
                const faves = getFavorites();
                filtered = filtered.filter(s => faves.includes(s.id));
            }

            // sort by start time
            filtered.sort((a, b) => {
                const aMin = a.start ? parseInt(a.start.replace(':', '')) : 0;
                const bMin = b.start ? parseInt(b.start.replace(':', '')) : 0;
                return aMin - bMin;
            });

            // update fave count
            const faves = getFavorites();
            faveCount.textContent = `❤️ ${faves.length}`;

            if (filtered.length === 0) {
                container.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            let html = '';
            for (const s of filtered) {
                const isFave = isFavorite(s.id);
                const typeCls = getTypeClass(s.type);

                html += `
                    <div class="card" role="listitem" data-id="${s.id}">
                        <div class="card-stage-bar" style="background:${s.stageColor};"></div>
                        <div class="card-header">
                            <div class="card-stage-label">
                                <span class="card-stage-dot" style="background:${s.stageColor};"></span>
                                <span class="stage-name">${s.stage}</span>
                                <span class="card-day-badge">${s.day}. Gün</span>
                            </div>
                            <button class="card-fave ${isFave ? 'liked' : ''}" data-id="${s.id}" aria-label="${isFave ? 'Favoriden çıkar' : 'Favoriye ekle'}">
                                ${isFave ? '❤️' : '♡'}
                            </button>
                        </div>
                        <div class="card-time">
                            ${s.time}
                            <span class="dot"></span>
                            ${s.stageSub || ''}
                        </div>
                        <div class="card-title">${s.title}</div>
                        ${s.desc ? `<div class="card-desc" id="desc-${s.id}">${s.desc}</div>` : ''}
                        ${s.type ? `<span class="card-type ${typeCls}">${s.type}</span>` : ''}
                        ${s.speakers && s.speakers.length > 0 ? `
                            <div class="speakers">
                                ${s.speakers.map(sp => `
                                    <div class="speaker">
                                        <img class="speaker-avatar" src="${sp.img || ''}" alt="${sp.name}" loading="lazy" onerror="this.style.display='none'">
                                        <div class="speaker-info">
                                            <div class="speaker-name">${sp.name}</div>
                                            <div class="speaker-title">${sp.title || ''}</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            container.innerHTML = html;

            // event listeners for favorite buttons
            container.querySelectorAll('.card-fave').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = this.dataset.id;
                    toggleFavorite(id);
                });
            });

            // description expand (optional tap to expand)
            container.querySelectorAll('.card-desc').forEach(el => {
                if (el.scrollHeight > el.offsetHeight) {
                    const toggle = document.createElement('button');
                    toggle.className = 'card-desc-toggle';
                    toggle.textContent = '… devamı';
                    toggle.setAttribute('aria-label', 'Detayları göster');
                    el.parentNode.appendChild(toggle);
                    let expanded = false;
                    toggle.addEventListener('click', function(e) {
                        e.stopPropagation();
                        expanded = !expanded;
                        el.classList.toggle('expanded', expanded);
                        this.textContent = expanded ? 'daha az göster' : '… devamı';
                    });
                }
            });
        }

        // ─── FILTER UI ──────────────────────────────────────────────────────

        function initFilters() {
            // day tabs
            document.querySelectorAll('.day-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentDay = this.dataset.day;
                    render();
                });
            });

            // stage filters
            document.querySelectorAll('[data-filter="stage"]').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('[data-filter="stage"]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentStage = this.dataset.value;
                    render();
                });
            });

            // fave filters
            document.querySelectorAll('[data-filter="fave"]').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('[data-filter="fave"]').forEach(b => {
                        b.classList.remove('active', 'fave-active', 'fave-inactive');
                    });
                    this.classList.add('active');
                    if (this.dataset.value === 'favorites') {
                        this.classList.add('fave-active');
                        currentFave = 'favorites';
                    } else {
                        currentFave = 'all';
                    }
                    // toggle the other
                    document.querySelectorAll('[data-filter="fave"]').forEach(b => {
                        if (b.dataset.value !== this.dataset.value) {
                            b.classList.remove('active', 'fave-active');
                            if (b.dataset.value === 'favorites') b.classList.add('fave-inactive');
                        }
                    });
                    render();
                });
            });

            // clear favorites
            document.getElementById('clearFaves').addEventListener('click', function() {
                if (getFavorites().length === 0) return;
                if (confirm('Tüm favorileri temizlemek istediğinize emin misiniz?')) {
                    saveFavorites([]);
                    // reset fave filter to "all"
                    document.querySelectorAll('[data-filter="fave"]').forEach(b => {
                        b.classList.remove('active', 'fave-active', 'fave-inactive');
                        if (b.dataset.value === 'all') b.classList.add('active');
                    });
                    currentFave = 'all';
                    render();
                }
            });
        }

        // ─── INIT ────────────────────────────────────────────────────────────

        document.addEventListener('DOMContentLoaded', function() {
            initFilters();
            render();
        });
    </script>
